services:
  - type: web
    name: vpython-prompt-challenge
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
    disk:
      name: db
      mountPath: /app/db
      sizeGB: 1
